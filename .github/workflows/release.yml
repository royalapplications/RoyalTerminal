name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ─────────────────────────────────────────────
  # Native builds for each platform
  # ─────────────────────────────────────────────

  native-macos:
    name: Native (macOS ${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build libghostty and libghostty-vt
        working-directory: external/ghostty
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            zig build -Doptimize=ReleaseFast -Dapp-runtime=none -Demit-xcframework=false -Demit-macos-app=false
          else
            zig build -Doptimize=ReleaseFast -Dapp-runtime=none -Demit-xcframework=false -Demit-macos-app=false -Dtarget=x86_64-macos
          fi

      - name: Build ghostty-terminal
        working-directory: native/ghostty-terminal
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            zig build -Doptimize=ReleaseFast
          else
            zig build -Doptimize=ReleaseFast -Dtarget=x86_64-macos
          fi

      - name: Build ghostty-renderer-capi
        working-directory: native/ghostty-renderer-capi
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            zig build -Doptimize=ReleaseFast
          else
            zig build -Doptimize=ReleaseFast -Dtarget=x86_64-macos
          fi

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find external/ghostty/zig-out -name "*.dylib" -exec cp -L {} artifacts/ \;
          if [ -f native/ghostty-terminal/zig-out/lib/libghostty-terminal.dylib ]; then
            cp -L native/ghostty-terminal/zig-out/lib/libghostty-terminal.dylib artifacts/
          fi
          if [ -f native/ghostty-renderer-capi/zig-out/lib/libghostty-renderer-capi.dylib ]; then
            cp -L native/ghostty-renderer-capi/zig-out/lib/libghostty-renderer-capi.dylib artifacts/
          fi
          ls -la artifacts/

      - name: Verify required native artifacts (macOS)
        run: |
          set -euo pipefail
          required=(
            "libghostty.dylib"
            "libghostty-vt.dylib"
            "libghostty-terminal.dylib"
            "libghostty-renderer-capi.dylib"
          )
          for file in "${required[@]}"; do
            if [ ! -f "artifacts/${file}" ]; then
              echo "::error::Missing required macOS native artifact: ${file}"
              exit 1
            fi
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: native-osx-${{ matrix.arch }}
          path: artifacts/

  native-linux:
    name: Native (Linux ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfontconfig1-dev \
            libpng-dev \
            zlib1g-dev \
            libonig-dev \
            glslang-dev \
            libspirv-cross-c-shared-dev

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build libghostty and libghostty-vt
        working-directory: external/ghostty
        run: |
          zig build -Doptimize=ReleaseFast -Dapp-runtime=none \
            -fsys=freetype \
            -fsys=harfbuzz \
            -fsys=fontconfig \
            -fsys=libpng \
            -fsys=zlib \
            -fsys=oniguruma \
            -fsys=glslang \
            -fsys=spirv-cross

      - name: Build ghostty-terminal
        working-directory: native/ghostty-terminal
        run: zig build -Doptimize=ReleaseFast

      - name: Build ghostty-renderer-capi
        working-directory: native/ghostty-renderer-capi
        run: zig build -Doptimize=ReleaseFast

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find external/ghostty/zig-out -name "libghostty*.so*" -exec cp -L {} artifacts/ \;
          find native/ghostty-terminal/zig-out -name "libghostty-terminal.so*" -exec cp -L {} artifacts/ \; || true
          find native/ghostty-renderer-capi/zig-out -name "libghostty-renderer-capi.so*" -exec cp -L {} artifacts/ \; || true
          for base in libghostty libghostty-vt libghostty-terminal libghostty-renderer-capi; do
            if [ ! -f "artifacts/${base}.so" ]; then
              candidate="$(ls -1 artifacts/${base}.so* 2>/dev/null | head -n1 || true)"
              if [ -n "${candidate}" ]; then
                cp -f "${candidate}" "artifacts/${base}.so"
              fi
            fi
          done
          ls -la artifacts/

      - name: Verify required native artifacts (Linux)
        run: |
          set -euo pipefail
          required=(
            "libghostty.so"
            "libghostty-vt.so"
            "libghostty-terminal.so"
            "libghostty-renderer-capi.so"
          )
          for file in "${required[@]}"; do
            if [ ! -f "artifacts/${file}" ]; then
              echo "::error::Missing required Linux native artifact: ${file}"
              exit 1
            fi
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-${{ matrix.arch }}
          path: artifacts/

  native-windows:
    name: Native (Windows x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build libghostty and libghostty-vt
        working-directory: external/ghostty
        run: zig build -Doptimize=ReleaseFast -Dapp-runtime=none

      - name: Build ghostty-terminal
        working-directory: native/ghostty-terminal
        run: zig build -Doptimize=ReleaseFast

      - name: Build ghostty-renderer-capi
        working-directory: native/ghostty-renderer-capi
        run: zig build -Doptimize=ReleaseFast

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          find external/ghostty/zig-out -name "*.dll" -exec cp -L {} artifacts/ \;
          find external/ghostty/zig-out -name "*.lib" -exec cp -L {} artifacts/ \;
          find external/ghostty/zig-out -name "libghostty.so" -exec cp -L {} artifacts/ \; || true
          find native/ghostty-terminal/zig-out -name "*ghostty-terminal*.dll" -exec cp -L {} artifacts/ \; || true
          find native/ghostty-terminal/zig-out -name "*ghostty-terminal*.lib" -exec cp -L {} artifacts/ \; || true
          find native/ghostty-renderer-capi/zig-out -name "*ghostty-renderer-capi*.dll" -exec cp -L {} artifacts/ \; || true
          find native/ghostty-renderer-capi/zig-out -name "*ghostty-renderer-capi*.lib" -exec cp -L {} artifacts/ \; || true
          for base in ghostty ghostty-vt ghostty-terminal ghostty-renderer-capi; do
            if [ ! -f "artifacts/${base}.dll" ] && [ -f "artifacts/lib${base}.dll" ]; then
              cp -f "artifacts/lib${base}.dll" "artifacts/${base}.dll"
            fi
          done
          if [ ! -f "artifacts/ghostty.dll" ] && [ -f "artifacts/libghostty.so" ]; then
            cp -f "artifacts/libghostty.so" "artifacts/ghostty.dll"
          fi
          ls -la artifacts/

      - name: Verify required native artifacts (Windows)
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "ghostty.dll"
            "ghostty-vt.dll"
            "ghostty-terminal.dll"
            "ghostty-renderer-capi.dll"
          )
          for file in "${required[@]}"; do
            if [ ! -f "artifacts/${file}" ]; then
              echo "::error::Missing required Windows native artifact: ${file}"
              exit 1
            fi
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: native-win-x64
          path: artifacts/

  # ─────────────────────────────────────────────
  # Build, test, pack, and publish
  # ─────────────────────────────────────────────

  test:
    name: Test
    runs-on: macos-latest
    needs: [native-macos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download native (macOS arm64)
        uses: actions/download-artifact@v4
        with:
          name: native-osx-arm64
          path: src/GhosttySharp.Native.OSX/runtimes/osx-arm64/native/

      - name: Stage native artifacts for managed interop (macOS)
        shell: bash
        run: |
          set -euo pipefail
          rid="osx-arm64"
          src="src/GhosttySharp.Native.OSX/runtimes/${rid}/native"
          dst_interop="src/GhosttySharp.Rendering.Interop/runtimes/${rid}/native"
          dst_fixture="native/${rid}"
          mkdir -p "${dst_interop}" "${dst_fixture}"
          cp -f "${src}"/* "${dst_interop}/"
          cp -f "${src}"/* "${dst_fixture}/"
          ls -la "${dst_interop}"

      - name: Restore & Build
        run: dotnet build -c Release

      - name: Unit Tests
        run: dotnet test tests/GhosttySharp.Tests/GhosttySharp.Tests.csproj -c Release --no-build

      - name: Integration Tests
        run: dotnet test tests/GhosttySharp.IntegrationTests/GhosttySharp.IntegrationTests.csproj -c Release

  pack-and-publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    needs: [test, native-macos, native-linux, native-windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # Download native artifacts into package runtime directories
      - name: Download macOS arm64
        uses: actions/download-artifact@v4
        with:
          name: native-osx-arm64
          path: src/GhosttySharp.Native.OSX/runtimes/osx-arm64/native/

      - name: Download macOS x64
        uses: actions/download-artifact@v4
        with:
          name: native-osx-x64
          path: src/GhosttySharp.Native.OSX/runtimes/osx-x64/native/

      - name: Download Linux x64
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: src/GhosttySharp.Native.Linux64/runtimes/linux-x64/native/

      - name: Download Linux arm64
        uses: actions/download-artifact@v4
        with:
          name: native-linux-arm64
          path: src/GhosttySharp.Native.Linux64/runtimes/linux-arm64/native/

      - name: Download Windows x64
        uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: src/GhosttySharp.Native.Win64/runtimes/win-x64/native/

      - name: Verify downloaded native artifacts
        shell: bash
        run: |
          set -euo pipefail

          check_files() {
            local dir="$1"
            shift
            for file in "$@"; do
              if [ ! -f "${dir}/${file}" ]; then
                echo "::error::Missing required native artifact ${file} in ${dir}"
                exit 1
              fi
            done
          }

          check_files "src/GhosttySharp.Native.OSX/runtimes/osx-arm64/native" \
            "libghostty.dylib" "libghostty-vt.dylib" "libghostty-terminal.dylib" "libghostty-renderer-capi.dylib"
          check_files "src/GhosttySharp.Native.OSX/runtimes/osx-x64/native" \
            "libghostty.dylib" "libghostty-vt.dylib" "libghostty-terminal.dylib" "libghostty-renderer-capi.dylib"
          check_files "src/GhosttySharp.Native.Linux64/runtimes/linux-x64/native" \
            "libghostty.so" "libghostty-vt.so" "libghostty-terminal.so" "libghostty-renderer-capi.so"
          check_files "src/GhosttySharp.Native.Linux64/runtimes/linux-arm64/native" \
            "libghostty.so" "libghostty-vt.so" "libghostty-terminal.so" "libghostty-renderer-capi.so"
          check_files "src/GhosttySharp.Native.Win64/runtimes/win-x64/native" \
            "ghostty.dll" "ghostty-vt.dll" "ghostty-terminal.dll" "ghostty-renderer-capi.dll"

      # Pack managed packages with version from tag
      - name: Pack GhosttySharp
        run: dotnet pack src/GhosttySharp/GhosttySharp.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack GhosttySharp.Terminal
        run: dotnet pack src/GhosttySharp.Terminal/GhosttySharp.Terminal.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack GhosttySharp.Terminal.Services.Contracts
        run: dotnet pack src/GhosttySharp.Terminal.Services.Contracts/GhosttySharp.Terminal.Services.Contracts.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack GhosttySharp.Terminal.Services
        run: dotnet pack src/GhosttySharp.Terminal.Services/GhosttySharp.Terminal.Services.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack GhosttySharp.Rendering.Contracts
        run: dotnet pack src/GhosttySharp.Rendering.Contracts/GhosttySharp.Rendering.Contracts.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack GhosttySharp.Rendering.Interop
        run: dotnet pack src/GhosttySharp.Rendering.Interop/GhosttySharp.Rendering.Interop.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack GhosttySharp.Rendering.Interop.Skia
        run: dotnet pack src/GhosttySharp.Rendering.Interop.Skia/GhosttySharp.Rendering.Interop.Skia.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack GhosttySharp.Rendering.Skia
        run: dotnet pack src/GhosttySharp.Rendering.Skia/GhosttySharp.Rendering.Skia.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack GhosttySharp.Terminal.Vt.Managed
        run: dotnet pack src/GhosttySharp.Terminal.Vt.Managed/GhosttySharp.Terminal.Vt.Managed.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack GhosttySharp.Terminal.Vt.Ghostty
        run: dotnet pack src/GhosttySharp.Terminal.Vt.Ghostty/GhosttySharp.Terminal.Vt.Ghostty.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack GhosttySharp.Terminal.Vt.Default
        run: dotnet pack src/GhosttySharp.Terminal.Vt.Default/GhosttySharp.Terminal.Vt.Default.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack GhosttySharp.Terminal.Pty.Unix
        run: dotnet pack src/GhosttySharp.Terminal.Pty.Unix/GhosttySharp.Terminal.Pty.Unix.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack GhosttySharp.Terminal.Pty.Windows
        run: dotnet pack src/GhosttySharp.Terminal.Pty.Windows/GhosttySharp.Terminal.Pty.Windows.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack GhosttySharp.Terminal.Pty.Platform
        run: dotnet pack src/GhosttySharp.Terminal.Pty.Platform/GhosttySharp.Terminal.Pty.Platform.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack GhosttySharp.Avalonia
        run: dotnet pack src/GhosttySharp.Avalonia/GhosttySharp.Avalonia.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack GhosttySharp.Avalonia.Rendering
        run: dotnet pack src/GhosttySharp.Avalonia.Rendering/GhosttySharp.Avalonia.Rendering.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      # Pack native packages with version from tag
      - name: Pack GhosttySharp.Native.OSX
        run: dotnet pack src/GhosttySharp.Native.OSX/GhosttySharp.Native.OSX.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack GhosttySharp.Native.Win64
        run: dotnet pack src/GhosttySharp.Native.Win64/GhosttySharp.Native.Win64.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack GhosttySharp.Native.Linux64
        run: dotnet pack src/GhosttySharp.Native.Linux64/GhosttySharp.Native.Linux64.csproj -c Release -o artifacts/ /p:Version=${{ steps.version.outputs.VERSION }}

      - name: List packages
        run: ls -la artifacts/*.nupkg

      # Publish to NuGet
      - name: Push to NuGet.org
        run: dotnet nuget push "artifacts/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: artifacts/*.nupkg
