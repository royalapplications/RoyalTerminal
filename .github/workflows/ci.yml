name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [native-build-macos, native-build-linux, native-build-windows]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download macOS arm64 native
        if: matrix.os == 'macos-latest'
        uses: actions/download-artifact@v4
        with:
          name: native-osx-arm64
          path: src/RoyalTerminal.GhosttySharp.Native.OSX/runtimes/osx-arm64/native/

      - name: Download macOS x64 native
        if: matrix.os == 'macos-latest'
        uses: actions/download-artifact@v4
        with:
          name: native-osx-x64
          path: src/RoyalTerminal.GhosttySharp.Native.OSX/runtimes/osx-x64/native/

      - name: Download Linux x64 native
        if: matrix.os == 'ubuntu-latest'
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: src/RoyalTerminal.GhosttySharp.Native.Linux64/runtimes/linux-x64/native/

      - name: Download Linux arm64 native
        if: matrix.os == 'ubuntu-latest'
        uses: actions/download-artifact@v4
        with:
          name: native-linux-arm64
          path: src/RoyalTerminal.GhosttySharp.Native.Linux64/runtimes/linux-arm64/native/

      - name: Download Windows x64 native
        if: matrix.os == 'windows-latest'
        uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: src/RoyalTerminal.GhosttySharp.Native.Win64/runtimes/win-x64/native/

      - name: Stage native artifacts for managed interop (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          for rid in osx-arm64 osx-x64; do
            src="src/RoyalTerminal.GhosttySharp.Native.OSX/runtimes/${rid}/native"
            dst_interop="src/RoyalTerminal.Rendering.Interop/runtimes/${rid}/native"
            dst_fixture="native/${rid}"
            mkdir -p "${dst_interop}" "${dst_fixture}"
            cp -f "${src}"/* "${dst_interop}/"
            cp -f "${src}"/* "${dst_fixture}/"
          done
          ls -la src/RoyalTerminal.Rendering.Interop/runtimes/osx-arm64/native/

      - name: Stage native artifacts for managed interop (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          for rid in linux-x64 linux-arm64; do
            src="src/RoyalTerminal.GhosttySharp.Native.Linux64/runtimes/${rid}/native"
            dst_interop="src/RoyalTerminal.Rendering.Interop/runtimes/${rid}/native"
            dst_fixture="native/${rid}"
            mkdir -p "${dst_interop}" "${dst_fixture}"
            cp -f "${src}"/* "${dst_interop}/"
            cp -f "${src}"/* "${dst_fixture}/"
          done
          ls -la src/RoyalTerminal.Rendering.Interop/runtimes/linux-x64/native/

      - name: Stage native artifacts for managed interop (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $rid = "win-x64"
          $src = "src/RoyalTerminal.GhosttySharp.Native.Win64/runtimes/$rid/native"
          $dstInterop = "src/RoyalTerminal.Rendering.Interop/runtimes/$rid/native"
          $dstFixture = "native/$rid"
          New-Item -Path $dstInterop -ItemType Directory -Force | Out-Null
          New-Item -Path $dstFixture -ItemType Directory -Force | Out-Null
          Copy-Item "$src/*" $dstInterop -Recurse -Force
          Copy-Item "$src/*" $dstFixture -Recurse -Force
          Get-ChildItem $dstInterop | Format-Table Name, Length -AutoSize

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test (Unit)
        run: dotnet test tests/RoyalTerminal.Tests/RoyalTerminal.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: test-results/
          retention-days: 7

  native-build-macos:
    name: Native Build (macOS)
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build libghostty and libghostty-vt
        working-directory: external/ghostty
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            zig build -Doptimize=ReleaseFast -Dapp-runtime=none -Demit-xcframework=false -Demit-macos-app=false
          else
            zig build -Doptimize=ReleaseFast -Dapp-runtime=none -Demit-xcframework=false -Demit-macos-app=false -Dtarget=x86_64-macos
          fi

      - name: Build ghostty-terminal
        working-directory: native/ghostty-terminal
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            zig build -Doptimize=ReleaseFast
          else
            zig build -Doptimize=ReleaseFast -Dtarget=x86_64-macos
          fi

      - name: Build ghostty-renderer-capi
        working-directory: native/ghostty-renderer-capi
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            zig build -Doptimize=ReleaseFast
          else
            zig build -Doptimize=ReleaseFast -Dtarget=x86_64-macos
          fi

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/osx-${{ matrix.arch }}/native
          find external/ghostty/zig-out -name "*.dylib" -exec cp -L {} artifacts/osx-${{ matrix.arch }}/native/ \;
          if [ -f native/ghostty-terminal/zig-out/lib/libghostty-terminal.dylib ]; then
            cp -L native/ghostty-terminal/zig-out/lib/libghostty-terminal.dylib artifacts/osx-${{ matrix.arch }}/native/
          fi
          if [ -f native/ghostty-renderer-capi/zig-out/lib/libghostty-renderer-capi.dylib ]; then
            cp -L native/ghostty-renderer-capi/zig-out/lib/libghostty-renderer-capi.dylib artifacts/osx-${{ matrix.arch }}/native/
          fi
          ls -la artifacts/osx-${{ matrix.arch }}/native/

      - name: Verify required native artifacts (macOS)
        run: |
          set -euo pipefail
          artifact_dir="artifacts/osx-${{ matrix.arch }}/native"
          required=(
            "libghostty.dylib"
            "libghostty-vt.dylib"
            "libghostty-terminal.dylib"
            "libghostty-renderer-capi.dylib"
          )
          for file in "${required[@]}"; do
            if [ ! -f "${artifact_dir}/${file}" ]; then
              echo "::error::Missing required macOS native artifact: ${file}"
              exit 1
            fi
          done

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-osx-${{ matrix.arch }}
          path: artifacts/osx-${{ matrix.arch }}/native/
          retention-days: 7

  native-build-linux:
    name: Native Build (Linux)
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libbz2-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfontconfig1-dev \
            libpng-dev \
            zlib1g-dev \
            libonig-dev \
            glslang-dev \
            libspirv-cross-c-shared-dev
          multiarch="$(dpkg-architecture -qDEB_HOST_MULTIARCH)"
          if [ -f "/usr/lib/${multiarch}/libbz2.so" ] && [ ! -e "/usr/lib/${multiarch}/libbzip2.so" ]; then
            sudo ln -s "/usr/lib/${multiarch}/libbz2.so" "/usr/lib/${multiarch}/libbzip2.so"
          fi
          if [ -f "/usr/lib/${multiarch}/libbz2.a" ] && [ ! -e "/usr/lib/${multiarch}/libbzip2.a" ]; then
            sudo ln -s "/usr/lib/${multiarch}/libbz2.a" "/usr/lib/${multiarch}/libbzip2.a"
          fi

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build libghostty and libghostty-vt
        working-directory: external/ghostty
        run: |
          zig build -Doptimize=ReleaseFast -Dapp-runtime=none \
            -fsys=freetype \
            -fsys=fontconfig \
            -fsys=libpng \
            -fsys=zlib \
            -fsys=oniguruma \
            -fsys=glslang \
            -fsys=spirv-cross

      - name: Build ghostty-terminal
        working-directory: native/ghostty-terminal
        run: zig build -Doptimize=ReleaseFast

      - name: Build ghostty-renderer-capi
        working-directory: native/ghostty-renderer-capi
        run: zig build -Doptimize=ReleaseFast

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/linux-${{ matrix.arch }}/native
          find external/ghostty/zig-out -name "libghostty*.so*" -exec cp -L {} artifacts/linux-${{ matrix.arch }}/native/ \;
          find native/ghostty-terminal/zig-out -name "libghostty-terminal.so*" -exec cp -L {} artifacts/linux-${{ matrix.arch }}/native/ \; || true
          find native/ghostty-renderer-capi/zig-out -name "libghostty-renderer-capi.so*" -exec cp -L {} artifacts/linux-${{ matrix.arch }}/native/ \; || true
          for base in libghostty libghostty-vt libghostty-terminal libghostty-renderer-capi; do
            if [ ! -f "artifacts/linux-${{ matrix.arch }}/native/${base}.so" ]; then
              candidate="$(ls -1 artifacts/linux-${{ matrix.arch }}/native/${base}.so* 2>/dev/null | head -n1 || true)"
              if [ -n "${candidate}" ]; then
                cp -f "${candidate}" "artifacts/linux-${{ matrix.arch }}/native/${base}.so"
              fi
            fi
          done
          ls -la artifacts/linux-${{ matrix.arch }}/native/

      - name: Verify required native artifacts (Linux)
        run: |
          set -euo pipefail
          artifact_dir="artifacts/linux-${{ matrix.arch }}/native"
          required=(
            "libghostty.so"
            "libghostty-vt.so"
            "libghostty-terminal.so"
            "libghostty-renderer-capi.so"
          )
          for file in "${required[@]}"; do
            if [ ! -f "${artifact_dir}/${file}" ]; then
              echo "::error::Missing required Linux native artifact: ${file}"
              exit 1
            fi
          done

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-${{ matrix.arch }}
          path: artifacts/linux-${{ matrix.arch }}/native/
          retention-days: 7

  native-build-windows:
    name: Native Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build libghostty and libghostty-vt
        working-directory: external/ghostty
        run: zig build -Doptimize=ReleaseFast -Dapp-runtime=none

      - name: Build ghostty-terminal
        working-directory: native/ghostty-terminal
        run: zig build -Doptimize=ReleaseFast

      - name: Build ghostty-renderer-capi
        working-directory: native/ghostty-renderer-capi
        run: zig build -Doptimize=ReleaseFast

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts/win-x64/native
          find external/ghostty/zig-out -name "*.dll" -exec cp -L {} artifacts/win-x64/native/ \;
          find external/ghostty/zig-out -name "*.lib" -exec cp -L {} artifacts/win-x64/native/ \;
          find external/ghostty/zig-out -name "libghostty.so" -exec cp -L {} artifacts/win-x64/native/ \; || true
          find native/ghostty-terminal/zig-out -name "*ghostty-terminal*.dll" -exec cp -L {} artifacts/win-x64/native/ \; || true
          find native/ghostty-terminal/zig-out -name "*ghostty-terminal*.lib" -exec cp -L {} artifacts/win-x64/native/ \; || true
          find native/ghostty-renderer-capi/zig-out -name "*ghostty-renderer-capi*.dll" -exec cp -L {} artifacts/win-x64/native/ \; || true
          find native/ghostty-renderer-capi/zig-out -name "*ghostty-renderer-capi*.lib" -exec cp -L {} artifacts/win-x64/native/ \; || true
          for base in ghostty ghostty-vt ghostty-terminal ghostty-renderer-capi; do
            if [ ! -f "artifacts/win-x64/native/${base}.dll" ] && [ -f "artifacts/win-x64/native/lib${base}.dll" ]; then
              cp -f "artifacts/win-x64/native/lib${base}.dll" "artifacts/win-x64/native/${base}.dll"
            fi
          done
          if [ ! -f "artifacts/win-x64/native/ghostty.dll" ] && [ -f "artifacts/win-x64/native/libghostty.so" ]; then
            cp -f "artifacts/win-x64/native/libghostty.so" "artifacts/win-x64/native/ghostty.dll"
          fi
          ls -la artifacts/win-x64/native/

      - name: Verify required native artifacts (Windows)
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="artifacts/win-x64/native"
          required=(
            "ghostty.dll"
            "ghostty-vt.dll"
            "ghostty-terminal.dll"
            "ghostty-renderer-capi.dll"
          )
          for file in "${required[@]}"; do
            if [ ! -f "${artifact_dir}/${file}" ]; then
              echo "::error::Missing required Windows native artifact: ${file}"
              exit 1
            fi
          done

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-win-x64
          path: artifacts/win-x64/native/
          retention-days: 7

  integration-tests:
    name: Integration Tests (macOS)
    runs-on: macos-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download native library
        uses: actions/download-artifact@v4
        with:
          name: native-osx-arm64
          path: src/RoyalTerminal.GhosttySharp.Native.OSX/runtimes/osx-arm64/native/

      - name: Stage native artifacts for managed interop (macOS)
        shell: bash
        run: |
          set -euo pipefail
          rid="osx-arm64"
          src="src/RoyalTerminal.GhosttySharp.Native.OSX/runtimes/${rid}/native"
          dst_interop="src/RoyalTerminal.Rendering.Interop/runtimes/${rid}/native"
          dst_fixture="native/${rid}"
          mkdir -p "${dst_interop}" "${dst_fixture}"
          cp -f "${src}"/* "${dst_interop}/"
          cp -f "${src}"/* "${dst_fixture}/"
          ls -la "${dst_interop}"

      - name: Run integration tests
        run: dotnet test tests/RoyalTerminal.IntegrationTests/RoyalTerminal.IntegrationTests.csproj -c Release --logger "trx;LogFileName=integration-results.trx" --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: test-results/
          retention-days: 7

  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Download all native artifacts
      - name: Download macOS arm64 native
        uses: actions/download-artifact@v4
        with:
          name: native-osx-arm64
          path: src/RoyalTerminal.GhosttySharp.Native.OSX/runtimes/osx-arm64/native/

      - name: Download macOS x64 native
        uses: actions/download-artifact@v4
        with:
          name: native-osx-x64
          path: src/RoyalTerminal.GhosttySharp.Native.OSX/runtimes/osx-x64/native/

      - name: Download Linux x64 native
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: src/RoyalTerminal.GhosttySharp.Native.Linux64/runtimes/linux-x64/native/

      - name: Download Linux arm64 native
        uses: actions/download-artifact@v4
        with:
          name: native-linux-arm64
          path: src/RoyalTerminal.GhosttySharp.Native.Linux64/runtimes/linux-arm64/native/

      - name: Download Windows x64 native
        uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: src/RoyalTerminal.GhosttySharp.Native.Win64/runtimes/win-x64/native/

      - name: Verify downloaded native artifacts
        shell: bash
        run: |
          set -euo pipefail

          check_files() {
            local dir="$1"
            shift
            for file in "$@"; do
              if [ ! -f "${dir}/${file}" ]; then
                echo "::error::Missing required native artifact ${file} in ${dir}"
                exit 1
              fi
            done
          }

          check_files "src/RoyalTerminal.GhosttySharp.Native.OSX/runtimes/osx-arm64/native" \
            "libghostty.dylib" "libghostty-vt.dylib" "libghostty-terminal.dylib" "libghostty-renderer-capi.dylib"
          check_files "src/RoyalTerminal.GhosttySharp.Native.OSX/runtimes/osx-x64/native" \
            "libghostty.dylib" "libghostty-vt.dylib" "libghostty-terminal.dylib" "libghostty-renderer-capi.dylib"
          check_files "src/RoyalTerminal.GhosttySharp.Native.Linux64/runtimes/linux-x64/native" \
            "libghostty.so" "libghostty-vt.so" "libghostty-terminal.so" "libghostty-renderer-capi.so"
          check_files "src/RoyalTerminal.GhosttySharp.Native.Linux64/runtimes/linux-arm64/native" \
            "libghostty.so" "libghostty-vt.so" "libghostty-terminal.so" "libghostty-renderer-capi.so"
          check_files "src/RoyalTerminal.GhosttySharp.Native.Win64/runtimes/win-x64/native" \
            "ghostty.dll" "ghostty-vt.dll" "ghostty-terminal.dll" "ghostty-renderer-capi.dll"

      # Pack managed packages
      - name: Pack RoyalTerminal.GhosttySharp
        run: dotnet pack src/RoyalTerminal.GhosttySharp/RoyalTerminal.GhosttySharp.csproj -c Release -o artifacts/

      - name: Pack RoyalTerminal.GhosttySharp.Terminal
        run: dotnet pack src/RoyalTerminal.GhosttySharp.Terminal/RoyalTerminal.GhosttySharp.Terminal.csproj -c Release -o artifacts/

      - name: Pack RoyalTerminal.GhosttySharp.Terminal.Services.Contracts
        run: dotnet pack src/RoyalTerminal.GhosttySharp.Terminal.Services.Contracts/RoyalTerminal.GhosttySharp.Terminal.Services.Contracts.csproj -c Release -o artifacts/

      - name: Pack RoyalTerminal.GhosttySharp.Terminal.Services
        run: dotnet pack src/RoyalTerminal.GhosttySharp.Terminal.Services/RoyalTerminal.GhosttySharp.Terminal.Services.csproj -c Release -o artifacts/

      - name: Pack RoyalTerminal.Rendering.Contracts
        run: dotnet pack src/RoyalTerminal.Rendering.Contracts/RoyalTerminal.Rendering.Contracts.csproj -c Release -o artifacts/

      - name: Pack RoyalTerminal.Rendering.Interop
        run: dotnet pack src/RoyalTerminal.Rendering.Interop/RoyalTerminal.Rendering.Interop.csproj -c Release -o artifacts/

      - name: Pack RoyalTerminal.Rendering.Interop.Skia
        run: dotnet pack src/RoyalTerminal.Rendering.Interop.Skia/RoyalTerminal.Rendering.Interop.Skia.csproj -c Release -o artifacts/

      - name: Pack RoyalTerminal.Rendering.Skia
        run: dotnet pack src/RoyalTerminal.Rendering.Skia/RoyalTerminal.Rendering.Skia.csproj -c Release -o artifacts/

      - name: Pack RoyalTerminal.GhosttySharp.Terminal.Vt.Managed
        run: dotnet pack src/RoyalTerminal.GhosttySharp.Terminal.Vt.Managed/RoyalTerminal.GhosttySharp.Terminal.Vt.Managed.csproj -c Release -o artifacts/

      - name: Pack RoyalTerminal.GhosttySharp.Terminal.Vt.Ghostty
        run: dotnet pack src/RoyalTerminal.GhosttySharp.Terminal.Vt.Ghostty/RoyalTerminal.GhosttySharp.Terminal.Vt.Ghostty.csproj -c Release -o artifacts/

      - name: Pack RoyalTerminal.GhosttySharp.Terminal.Vt.Default
        run: dotnet pack src/RoyalTerminal.GhosttySharp.Terminal.Vt.Default/RoyalTerminal.GhosttySharp.Terminal.Vt.Default.csproj -c Release -o artifacts/

      - name: Pack RoyalTerminal.GhosttySharp.Terminal.Pty.Unix
        run: dotnet pack src/RoyalTerminal.GhosttySharp.Terminal.Pty.Unix/RoyalTerminal.GhosttySharp.Terminal.Pty.Unix.csproj -c Release -o artifacts/

      - name: Pack RoyalTerminal.GhosttySharp.Terminal.Pty.Windows
        run: dotnet pack src/RoyalTerminal.GhosttySharp.Terminal.Pty.Windows/RoyalTerminal.GhosttySharp.Terminal.Pty.Windows.csproj -c Release -o artifacts/

      - name: Pack RoyalTerminal.GhosttySharp.Terminal.Pty.Platform
        run: dotnet pack src/RoyalTerminal.GhosttySharp.Terminal.Pty.Platform/RoyalTerminal.GhosttySharp.Terminal.Pty.Platform.csproj -c Release -o artifacts/

      - name: Pack RoyalTerminal.Avalonia
        run: dotnet pack src/RoyalTerminal.Avalonia/RoyalTerminal.Avalonia.csproj -c Release -o artifacts/

      - name: Pack RoyalTerminal.Avalonia.Rendering
        run: dotnet pack src/RoyalTerminal.Avalonia.Rendering/RoyalTerminal.Avalonia.Rendering.csproj -c Release -o artifacts/

      # Pack native packages
      - name: Pack RoyalTerminal.GhosttySharp.Native.OSX
        run: dotnet pack src/RoyalTerminal.GhosttySharp.Native.OSX/RoyalTerminal.GhosttySharp.Native.OSX.csproj -c Release -o artifacts/

      - name: Pack RoyalTerminal.GhosttySharp.Native.Win64
        run: dotnet pack src/RoyalTerminal.GhosttySharp.Native.Win64/RoyalTerminal.GhosttySharp.Native.Win64.csproj -c Release -o artifacts/

      - name: Pack RoyalTerminal.GhosttySharp.Native.Linux64
        run: dotnet pack src/RoyalTerminal.GhosttySharp.Native.Linux64/RoyalTerminal.GhosttySharp.Native.Linux64.csproj -c Release -o artifacts/

      - name: List packages
        run: ls -la artifacts/*.nupkg

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
          retention-days: 30
